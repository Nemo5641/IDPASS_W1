<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* === ตั้งค่าพื้นฐาน === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            /* เปลี่ยนพื้นหลัง body เป็นสีขาว */
            background-color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            min-height: 100vh;
        }

        /* ส่วนกล่องหลัก */
        .loginform {
            background-color: #ffffff;
            width: 100%;
            min-height: 100vh; 
            display: flex;
            flex-direction: column; 
        }

        /* ส่วนเนื้อหาฟอร์ม (จัดให้อยู่กึ่งกลางหน้าจอ)*/
        .form-container {
            padding: 40px 20px;
            width: 100%;
            max-width: 450px; 
            margin: 0 auto; 
            flex-grow: 1; 
        }

        /* ส่วนหัวของฟอร์ม */
        .form-header {
            margin-bottom: 25px;
        }

        /* ส่วนหัวของฟอร์ม(คำว่า login) */
        .form-header h2 {
            color: #8cc63f; 
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ส่วนคำอธิบายของฟอร์ม */
        .form-header p {
            color: #888;
            font-size: 12px;
            margin-top: 5px;
        }

        /* ส่วน Tabs */
        .tabs {
            display: flex;
            margin-bottom: 20px;
        }

        /* ส่วนปุ่ม Tab */
        .tab-button {
            flex: 1;
            padding: 12px 0;
            border: none;
            font-weight: bold;
            cursor: pointer;
            color: #555;
            background-color: #e6e6e6; 
            transition: background-color 0.3s;
            border-radius: 4px; 
        }

        /* ส่วนปุ่ม Tab (ปุ่มแรก) */
        .tab-button:first-child {
            margin-right: 2px;
        }

        /* ส่วนปุ่ม Tab (ปุ่มที่ถูกเลือก) */
        .tab-button.active {
            background-color: #BFD743; 
            color: #333;
        }

        /* ส่วน Input */
        .input-group {
            margin-bottom: 15px;
            position: relative;
        }

        /* ส่วน Input */
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        /* ส่วน Input (เมื่อถูกเลือก) */
        .input-group input:focus {
            border-color: #8cc63f;
        }

        /* ส่วนไอคอนตา */
        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
            user-select: none;
        }

        /* ส่วนปุ่ม Login */
        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #8DC63F;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s;
        }

        /* ส่วนปุ่ม Login (เมื่อเอาเมาส์ชี้) */
        .login-btn:hover {
            background-color: #7ab32e;
        }
    </style>
</head>
<body>

    <div class="loginform">
        <div class="banner"> 
            <img src="pic/Frame 3581.png" alt="banner">
        </div>

        <div class="form-container">
            <div class="form-header">
                <h2> <img src="pic/lock.png" alt="Lock" style="width: 24px; height: auto;"> Log in</h2>
                <p>Enter your username and password to log on</p>
            </div>

            <div class="tabs">
                <button type="button" class="tab-button active" onclick="switchTab(event, 'Token')">TOKEN</button>
                <button type="button" class="tab-button" onclick="switchTab(event, 'OTP')">OTP</button>
            </div>

            <form id="loginForm" action="#" method="POST">
                <div class="input-group">
                    <input type="text" id="usernameInput" placeholder="Username" required>
                </div>
    
                <div class="input-group">
                    <input type="password" id="passwordInput" placeholder="••••••••" required>
                    <span class="eye-icon" onclick="togglePassword()">👁️‍🗨️</span> 
                </div>

                <div class="input-group" id="dynamicInputGroup">
                    <input type="text" id="dynamicInput" placeholder="Token" required>
                </div>

                <button type="submit" class="login-btn">Log in</button>
            </form>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
